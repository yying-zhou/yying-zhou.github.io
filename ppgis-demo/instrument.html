<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3DGS-PPGIS · Value Annotation Instrument</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb; --surface: #ffffff; --surface2: #ede9e0;
    --border: rgba(60,50,30,0.12); --border-strong: rgba(60,50,30,0.22);
    --text: #1a1712; --text-muted: #7a7266; --text-hint: #aaa49a;
    --accent: #2d5a1b; --accent-light: #e6f0e0;
    --accent2: #1a3d6e; --accent2-light: #dde8f4;
    --coral: #c04a1e; --coral-light: #f8ede8;
    --amber: #a06010; --amber-light: #f5eedd;
    --radius: 8px; --radius-lg: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
  .app { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }
  header { grid-column: 1/-1; display: flex; align-items: center; gap: 12px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; color: var(--text); }
  .logo span { color: var(--accent); }
  .header-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .badge { font-family: 'DM Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 4px; white-space: nowrap; }
  .badge-3d   { background: var(--accent-light);  color: var(--accent);  border: 1px solid rgba(45,90,27,0.2); }
  .badge-ply  { background: var(--accent2-light); color: var(--accent2); border: 1px solid rgba(26,61,110,0.2); }
  .badge-glb  { background: var(--amber-light);   color: var(--amber);   border: 1px solid rgba(160,96,16,0.2); }
  .badge-spz  { background: #f0e6f5; color: #6b2fa0; border: 1px solid rgba(107,47,160,0.2); }
  .badge-none { background: var(--surface2); color: var(--text-hint); border: 1px solid var(--border); }

  .scene-panel { position: relative; overflow: hidden; background: #1a1f14; }
  #sceneCanvas { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }

  /* ── Scene picker (shown before any scene loads) ── */
  .scene-picker {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    z-index: 5; padding: 24px;
  }
  .picker-title { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 0.06em; text-transform: uppercase; }
  .picker-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .picker-card {
    width: 200px; padding: 18px 16px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
    cursor: pointer; transition: all 0.18s; text-align: left;
  }
  .picker-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(109,184,92,0.45); }
  .picker-card-icon { font-size: 22px; margin-bottom: 10px; }
  .picker-card-title { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.75); margin-bottom: 5px; }
  .picker-card-sub   { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.5; }
  .picker-card-badge { display: inline-block; margin-top: 10px; font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 3px; }
  .picker-card-badge.demo { background: rgba(45,90,27,0.35); color: #b8d8a8; border: 1px solid rgba(100,200,80,0.2); }
  .picker-card-badge.spz  { background: rgba(107,47,160,0.35); color: #d4aaff; border: 1px solid rgba(160,100,220,0.2); }
  .picker-card-badge.file { background: rgba(26,61,110,0.35); color: #a8c0e0; border: 1px solid rgba(80,140,220,0.2); }
  .picker-divider { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.2); }

  /* Drop zone (shown when "upload file" card clicked) */
  .drop-zone {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    border: 2px dashed rgba(255,255,255,0.12); margin: 28px;
    border-radius: 12px; cursor: pointer; transition: border-color 0.2s; z-index: 6;
  }
  .drop-zone.visible { display: flex; }
  .drop-zone:hover, .drop-zone.dragover { border-color: rgba(109,184,92,0.55); }
  .dz-title { font-family: 'DM Mono', monospace; font-size: 15px; color: rgba(255,255,255,0.55); }
  .dz-sub   { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.28); }
  .dz-row   { display: flex; gap: 8px; margin-top: 8px; }
  .dz-btn   { padding: 8px 18px; border-radius: 6px; border: 1px solid rgba(109,184,92,0.35); background: rgba(45,90,27,0.28); color: #b8d8a8; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: background 0.15s; }
  .dz-btn:hover { background: rgba(45,90,27,0.45); }
  .dz-btn-back { padding: 8px 18px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
  #fileInput { display: none; }

  /* Loading overlay */
  .loading-overlay { position: absolute; inset: 0; background: rgba(26,31,20,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 15; transition: opacity 0.35s; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-label  { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.6); }
  .loading-format { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); }
  .loading-bar-wrap { width: 180px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .loading-bar { height: 100%; width: 0%; background: #6db85c; border-radius: 2px; transition: width 0.25s; }

  /* HUD */
  .scene-hud { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; align-items: flex-start; justify-content: space-between; pointer-events: none; }
  .hud-left { display: flex; flex-direction: column; gap: 6px; }
  .hud-pill { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; border-radius: 4px; display: inline-flex; align-items: center; gap: 6px; }
  .hud-pill.scene { background: rgba(0,0,0,0.6); color: #c8d8b8; border: 1px solid rgba(255,255,255,0.1); }
  .hud-pill.hint  { background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.07); }
  .hud-dot { width: 7px; height: 7px; border-radius: 50%; background: #6db85c; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
  .overlay-toggle { pointer-events: all; display: flex; flex-direction: column; gap: 5px; }
  .ot-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.15s; }
  .ot-btn.on  { background: rgba(45,90,27,0.7);  color: #b8d8a8; border-color: rgba(100,200,80,0.3); }
  .ot-btn.on2 { background: rgba(26,61,110,0.7); color: #a8c0e0; border-color: rgba(80,140,220,0.3); }

  /* Change scene button in HUD */
  .hud-change { pointer-events: all; font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; }
  .hud-change:hover { background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.8); }

  .coord-display { position: absolute; bottom: 14px; left: 14px; font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.38); pointer-events: none; }

  /* Bottom sheet */
  .bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border-strong); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px 20px 24px; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); z-index: 10; }
  .bottom-sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 16px; }
  .sheet-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; color: var(--text); }
  .value-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 14px; }
  .vbtn { padding: 9px 12px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; color: var(--text-muted); text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
  .vbtn:hover { background: var(--surface2); color: var(--text); }
  .vbtn.sel { font-weight: 500; border-width: 1.5px; }
  .vbtn.sel[data-val="recreational"] { background: var(--accent2-light); border-color: var(--accent2); color: var(--accent2); }
  .vbtn.sel[data-val="aesthetic"]    { background: var(--accent-light);  border-color: var(--accent);  color: var(--accent); }
  .vbtn.sel[data-val="wildlife"]     { background: var(--amber-light);   border-color: var(--amber);   color: var(--amber); }
  .vbtn.sel[data-val="avoidance"]    { background: var(--coral-light);   border-color: var(--coral);   color: var(--coral); }
  .vbtn-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .note-row { margin-bottom: 14px; }
  .note-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .note-input:focus { border-color: var(--accent); }
  .sheet-actions { display: flex; gap: 8px; }
  .btn-save { flex: 1; padding: 9px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-save:hover { background: #1e4012; }
  .btn-cancel { padding: 9px 16px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: none; color: var(--text-muted); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
